name: Build Ashen Voice Phase 1

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/AshenVoice/AshenVoice.csproj

      - name: Build application
        run: dotnet build src/AshenVoice/AshenVoice.csproj -c Release --no-restore

      - name: Publish self-contained application
        run: dotnet publish src/AshenVoice/AshenVoice.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\AshenVoice.iss"
          if (!(Test-Path "release\AshenVoice-Setup-1.0.0.exe")) { throw "Installer was not created." }

      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash "release\AshenVoice-Setup-1.0.0.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  AshenVoice-Setup-1.0.0.exe" | Set-Content "release\AshenVoice-Setup-1.0.0.exe.sha256"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ashen-Voice-Phase1-Installer
          path: |
            release/AshenVoice-Setup-1.0.0.exe
            release/AshenVoice-Setup-1.0.0.exe.sha256
          if-no-files-found: error
