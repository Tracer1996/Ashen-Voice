name: Build Ashen Voice Phase 2

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure Win32 native build
        run: cmake -S native -B native/build -A Win32

      - name: Compile DirectX 9 overlay and injector
        run: cmake --build native/build --config Release --parallel

      - name: Stage native Phase 2 files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src/AshenVoice/native" | Out-Null
          Copy-Item "native/build/bin/AshenVoiceOverlay.dll" "src/AshenVoice/native/AshenVoiceOverlay.dll" -Force
          Copy-Item "native/build/bin/AshenVoiceInjector.exe" "src/AshenVoice/native/AshenVoiceInjector.exe" -Force

          if (!(Test-Path "src/AshenVoice/native/AshenVoiceOverlay.dll")) {
            throw "AshenVoiceOverlay.dll was not staged."
          }
          if (!(Test-Path "src/AshenVoice/native/AshenVoiceInjector.exe")) {
            throw "AshenVoiceInjector.exe was not staged."
          }

      - name: Restore application
        run: dotnet restore src/AshenVoice/AshenVoice.csproj

      - name: Build application
        run: dotnet build src/AshenVoice/AshenVoice.csproj -c Release --no-restore

      - name: Publish self-contained application
        run: >-
          dotnet publish src/AshenVoice/AshenVoice.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Verify published native files
        shell: powershell
        run: |
          if (!(Test-Path "publish/native/AshenVoiceOverlay.dll")) {
            throw "Published overlay DLL is missing."
          }
          if (!(Test-Path "publish/native/AshenVoiceInjector.exe")) {
            throw "Published injector is missing."
          }

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build Phase 2 installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\AshenVoice.iss"

          if (!(Test-Path "release\AshenVoice-Setup-1.1.0.exe")) {
            throw "Phase 2 installer was not created."
          }

      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash "release\AshenVoice-Setup-1.1.0.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash AshenVoice-Setup-1.1.0.exe" | Set-Content "release\AshenVoice-Setup-1.1.0.exe.sha256"

      - name: Upload Phase 2 installer
        uses: actions/upload-artifact@v4
        with:
          name: Ashen-Voice-Phase2-Installer
          path: |
            release/AshenVoice-Setup-1.1.0.exe
            release/AshenVoice-Setup-1.1.0.exe.sha256
          if-no-files-found: error
