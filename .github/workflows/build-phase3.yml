name: Build Ashen Voice Phase 3

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Install Discord companion dependencies
        run: npm install --omit=dev --prefix companion

      - name: Configure Win32 native build
        run: cmake -S native -B native/build -A Win32

      - name: Compile compact DirectX 9 overlay and injector
        run: cmake --build native/build --config Release --parallel

      - name: Stage native files for application build
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src/AshenVoice/native" | Out-Null
          Copy-Item "native/build/bin/AshenVoiceOverlay.dll" "src/AshenVoice/native/AshenVoiceOverlay.dll" -Force
          Copy-Item "native/build/bin/AshenVoiceInjector.exe" "src/AshenVoice/native/AshenVoiceInjector.exe" -Force

      - name: Restore application
        run: dotnet restore src/AshenVoice/AshenVoice.csproj

      - name: Build application
        run: dotnet build src/AshenVoice/AshenVoice.csproj -c Release --no-restore

      - name: Publish self-contained application
        run: >-
          dotnet publish src/AshenVoice/AshenVoice.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Package native overlay files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "publish/native" | Out-Null
          Copy-Item "native/build/bin/AshenVoiceOverlay.dll" "publish/native/AshenVoiceOverlay.dll" -Force
          Copy-Item "native/build/bin/AshenVoiceInjector.exe" "publish/native/AshenVoiceInjector.exe" -Force

      - name: Package Discord companion and Node runtime
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "publish/discord" | Out-Null
          $nodePath = (Get-Command node.exe).Source
          Copy-Item $nodePath "publish/discord/node.exe" -Force
          Copy-Item "companion/companion.js" "publish/discord/companion.js" -Force
          Copy-Item "companion/package.json" "publish/discord/package.json" -Force
          Copy-Item "companion/node_modules" "publish/discord/node_modules" -Recurse -Force

      - name: Verify packaged Phase 3 files
        shell: powershell
        run: |
          $required = @(
            "publish/AshenVoice.exe",
            "publish/native/AshenVoiceOverlay.dll",
            "publish/native/AshenVoiceInjector.exe",
            "publish/discord/node.exe",
            "publish/discord/companion.js",
            "publish/discord/node_modules/discord.js/package.json",
            "publish/discord/node_modules/@discordjs/voice/package.json"
          )

          foreach ($file in $required) {
            if (!(Test-Path $file)) {
              throw "Required Phase 3 file is missing: $file"
            }
          }

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build Phase 3 installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\AshenVoice.iss"

          if (!(Test-Path "release\AshenVoice-Setup-1.2.0.exe")) {
            throw "Phase 3 installer was not created."
          }

      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash "release\AshenVoice-Setup-1.2.0.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash AshenVoice-Setup-1.2.0.exe" | Set-Content "release\AshenVoice-Setup-1.2.0.exe.sha256"

      - name: Upload Phase 3 installer
        uses: actions/upload-artifact@v4
        with:
          name: Ashen-Voice-Phase3-Installer
          path: |
            release/AshenVoice-Setup-1.2.0.exe
            release/AshenVoice-Setup-1.2.0.exe.sha256
          if-no-files-found: error
