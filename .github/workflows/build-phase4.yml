name: Build Ashen Voice 1.4.5

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Locate Ashen Voice project
        shell: powershell
        run: |
          $project = Get-ChildItem -Path . -Recurse -Filter "AshenVoice.csproj" -File |
            Select-Object -First 1

          if ($null -eq $project) {
            Write-Host "Repository files:"
            Get-ChildItem -Path . -Recurse -File | ForEach-Object {
              Write-Host $_.FullName
            }
            throw "AshenVoice.csproj was not found in the checked-out repository."
          }

          Write-Host "Using project: $($project.FullName)"
          "ASHEN_PROJECT=$($project.FullName)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASHEN_PROJECT_DIR=$($project.DirectoryName)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Discord Application ID
        shell: powershell
        run: |
          $clientId = "${{ vars.DISCORD_CLIENT_ID }}"

          if ($clientId -notmatch '^\d{17,20}$') {
            throw "Create a GitHub repository variable named DISCORD_CLIENT_ID containing the Application ID from the Discord Developer Portal."
          }

          $path = Join-Path $env:ASHEN_PROJECT_DIR "DiscordBuildConfig.cs"
          $content = Get-Content $path -Raw

          if ($content.Contains("__DISCORD_CLIENT_ID__")) {
            $content = $content.Replace("__DISCORD_CLIENT_ID__", $clientId)
          }
          else {
            $content = $content -replace 'public const string ClientId = "[^"]*";', "public const string ClientId = `"$clientId`";"
          }

          Set-Content -Path $path -Value $content -NoNewline

      - name: Configure Win32 native build
        run: cmake -S native -B native/build -A Win32

      - name: Compile DirectX 9 overlay and injector
        run: cmake --build native/build --config Release --parallel

      - name: Stage native files for application build
        shell: powershell
        run: |
          $nativeTarget = Join-Path $env:ASHEN_PROJECT_DIR "native"
          New-Item -ItemType Directory -Force -Path $nativeTarget | Out-Null
          Copy-Item "native/build/bin/AshenVoiceOverlay.dll" (Join-Path $nativeTarget "AshenVoiceOverlay.dll") -Force
          Copy-Item "native/build/bin/AshenVoiceInjector.exe" (Join-Path $nativeTarget "AshenVoiceInjector.exe") -Force

      - name: Restore application
        shell: powershell
        run: dotnet restore "$env:ASHEN_PROJECT"

      - name: Build application
        shell: powershell
        run: dotnet build "$env:ASHEN_PROJECT" -c Release --no-restore

      - name: Publish self-contained application
        shell: powershell
        run: |
          dotnet publish "$env:ASHEN_PROJECT" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: Package native overlay files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "publish/native" | Out-Null
          Copy-Item "native/build/bin/AshenVoiceOverlay.dll" "publish/native/AshenVoiceOverlay.dll" -Force
          Copy-Item "native/build/bin/AshenVoiceInjector.exe" "publish/native/AshenVoiceInjector.exe" -Force

      - name: Verify packaged files
        shell: powershell
        run: |
          $required = @(
            "publish/AshenVoice.exe",
            "publish/native/AshenVoiceOverlay.dll",
            "publish/native/AshenVoiceInjector.exe"
          )

          foreach ($file in $required) {
            if (!(Test-Path $file)) {
              throw "Required file is missing: $file"
            }
          }

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\AshenVoice.iss"

          if (!(Test-Path "release\AshenVoice-Setup-1.4.5.exe")) {
            throw "Ashen Voice installer was not created."
          }

      - name: Create checksum
        shell: powershell
        run: |
          $hash = (Get-FileHash "release\AshenVoice-Setup-1.4.5.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash AshenVoice-Setup-1.4.5.exe" |
            Set-Content "release\AshenVoice-Setup-1.4.5.exe.sha256"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Ashen-Voice-1.4.5-Installer
          path: |
            release/AshenVoice-Setup-1.4.5.exe
            release/AshenVoice-Setup-1.4.5.exe.sha256
          if-no-files-found: error
