name: Build Ashen Voice Installer
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Build native Win32 overlay
        shell: cmd
        run: |
          mkdir release
          cmake -S native -B native\build -A Win32
          cmake --build native\build --config Release
          copy native\build\Release\AshenVoice.dll release\AshenVoice.dll
          copy native\build\Release\AshenVoiceInjector.exe release\AshenVoiceInjector.exe
      - name: Install packages
        run: npm install
      - name: Build Setup.exe
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: Ashen-Voice-Setup
          path: dist/*.exe
